name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: dMailSender-windows-amd64.exe
            build_output: build/bin/dMailSender.exe
          - os: macos-latest
            artifact: dMailSender-macos-amd64.zip
            build_output: build/bin/dMailSender.app
          - os: ubuntu-22.04
            artifact: dMailSender-linux-amd64
            build_output: build/bin/dMailSender

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: Build
        run: wails build

      - name: Sign and package macOS app
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep -s - build/bin/dMailSender.app
          cd build/bin
          zip -r ../../${{ matrix.artifact }} dMailSender.app

      - name: Rename artifact
        if: runner.os != 'macOS'
        shell: bash
        run: |
          cp "${{ matrix.build_output }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## What's New in ${{ github.ref_name }}

            ### UI Improvements
            - **Envelope opt-chip buttons redesigned** — `#` → `#Num`, `TS` → `Time` with larger size for better readability
            - **From ↔ To Swap button** — One-click swap between sender and recipient addresses (vertical button spanning both rows)
            - **Timestamps on Results & SMTP Log** — Every log entry now shows `HH:MM:SS` timestamp (measured at backend event time)
            - **Send Start / Stop / Done logs** — Results tab now records when sending starts, stops, and completes with details

            ### SMTP Log Enhancements
            - **Send failure errors in SMTP Log** — SMTP errors (e.g., 550 relay denied) now appear in the SMTP Log tab, not just Results
            - **Mail index prefix `[#N]`** — Each SMTP log line is tagged with its mail index for easy correlation with Results tab

            ### Security (from previous session)
            - **Data race fix** — `lastSent`/`lastFailed` counters now use `atomic.Int64` for thread safety
            - **Password removed from frontend state** — Password is saved directly to OS keychain and cleared from memory immediately
            - **Test Connection no longer saves config** — Test button now syncs to memory only (consistent with Send behavior)

            ### Bug Fixes
            - Fixed Test Connection button unintentionally saving config to disk

            ---
            **Full Changelog**: https://github.com/mimyosa/dmailsender/compare/v0.5...${{ github.ref_name }}
          files: artifacts/*
